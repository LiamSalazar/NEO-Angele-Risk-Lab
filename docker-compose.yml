services:
  app:
    build: .
    working_dir: /app
    environment:
      NEO_ANGE_ENV: development
      NEO_ANGE_LOG_LEVEL: INFO
      NEO_ANGE_DATA_DIR: data
      NEO_ANGE_REQUEST_TIMEOUT: 30
      NEO_ANGE_SPARK_MASTER: local[*]
      NEO_ANGE_SPARK_APP_NAME: neo-ange-risk-lab
      NEO_ANGE_SPARK_LOG_LEVEL: WARN
      NEO_ANGE_SILVER_DIR: data/silver
      NEO_ANGE_GOLD_DIR: data/gold
    volumes:
      - .:/app
    command: uvicorn neo_ange.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    depends_on:
      - app
